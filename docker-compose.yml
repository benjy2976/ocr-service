services:

  # ─────────────────────────────────────────────────────────────────────────────
  # opensearch: motor de busqueda documental
  # Puerto externo: 19200 → interno: 9200
  # ─────────────────────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "19200:9200"
      - "19600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - grh_network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # ocr-search-api: API de busqueda sobre OpenSearch
  # Puerto externo: 18020 → interno: 8000
  # ─────────────────────────────────────────────────────────────────────────────
  ocr-search-api:
    build: .
    ports:
      - "18020:8000"
    environment:
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-munis_ocr_pages}
    networks:
      - grh_network
    command: ["uvicorn", "app.search_api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - opensearch
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # ocr-search-indexer: indexa artefactos text JSON desde ocr_nfs_cache
  # ─────────────────────────────────────────────────────────────────────────────
  ocr-search-indexer:
    build: .
    environment:
      OCR_SHARED_CACHE_DIR: /nfs-cache
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-munis_ocr_pages}
      SEARCH_INDEXER_POLL_INTERVAL_SECONDS: ${SEARCH_INDEXER_POLL_INTERVAL_SECONDS:-300}
      SEARCH_INDEXER_BATCH_SIZE: ${SEARCH_INDEXER_BATCH_SIZE:-500}
      SEARCH_INDEXER_LOG_LEVEL: ${SEARCH_INDEXER_LOG_LEVEL:-INFO}
    volumes:
      - ocr_nfs_cache:/nfs-cache:ro
    networks:
      - grh_network
    command: ["python3", "-m", "app.search_indexer"]
    depends_on:
      - opensearch
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # ocr-api: API HTTP on-demand (FastAPI)
  # Puerto externo: 18010 → interno: 8000
  # ─────────────────────────────────────────────────────────────────────────────
  ocr-api:
    build: .
    shm_size: "8gb"
    ports:
      - "18010:8000"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      # ── Directorios ──────────────────────────────────────────────────────────
      OCR_TMP_DIR: /data/tmp
      OCR_OUT_DIR: /data/out
      OCR_SHARED_CACHE_DIR: /nfs-cache
      # ── OCR ─────────────────────────────────────────────────────────────────
      OCR_LANG: spa
      OCR_MODE: searchable_cpu
      # ── App ─────────────────────────────────────────────────────────────────
      REVIEW_APP_VERSION: "1.2"
      CLASSIFY_DIR: /data/classify
      CLASSIFY_CONF_THRESHOLD: "0.99"
      STAMP_MODEL_PATH: /data/models/stamp_detector_v2.pt
      # ── GPU ─────────────────────────────────────────────────────────────────
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./data:/data
      - ocr_nfs_cache:/nfs-cache
      - ./app:/app/app
      - ./scripts:/app/scripts:ro
    networks:
      - grh_network
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  # ─────────────────────────────────────────────────────────────────────────────
  # ocr-worker: consumidor activo de la cola OCR de Munis
  # Sin puertos expuestos — proceso interno de polling
  # ─────────────────────────────────────────────────────────────────────────────
  ocr-worker:
    build: .
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      # ── Directorios ──────────────────────────────────────────────────────────
      OCR_TMP_DIR: /data/tmp
      OCR_OUT_DIR: /data/out
      OCR_WORK_DIR: /data/tmp/work
      OCR_SHARED_CACHE_DIR: /nfs-cache
      TMPDIR: /data/tmp
      TMP: /data/tmp
      TEMP: /data/tmp
      # ── OCR ─────────────────────────────────────────────────────────────────
      OCR_LANG: spa
      OCR_MODE: searchable_cpu
      STAMP_MODEL_PATH: /data/models/stamp_detector_v2.pt
      # ── GPU ─────────────────────────────────────────────────────────────────
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # ── Munis / Worker ───────────────────────────────────────────────────────
      # OBLIGATORIO: definir en .env o en el entorno antes de levantar
      MUNIS_BASE_URL: ${MUNIS_BASE_URL:-}
      MUNIS_OCR_TOKEN: ${MUNIS_OCR_TOKEN:-}
      OCR_WORKER_NAME: ${OCR_WORKER_NAME:-ocr-worker-1}
      OCR_WORKER_CONCURRENCY: ${OCR_WORKER_CONCURRENCY:-1}
      OCR_POLL_INTERVAL_SECONDS: ${OCR_POLL_INTERVAL_SECONDS:-10}
      OCR_WORKER_ENABLED: ${OCR_WORKER_ENABLED:-true}
      OCR_CALLBACK_TIMEOUT_SECONDS: ${OCR_CALLBACK_TIMEOUT_SECONDS:-30}
      OCR_DOWNLOAD_TIMEOUT_SECONDS: ${OCR_DOWNLOAD_TIMEOUT_SECONDS:-120}
      OCR_WORKER_MAX_CONSECUTIVE_ERRORS: ${OCR_WORKER_MAX_CONSECUTIVE_ERRORS:-20}
      OCR_WORKER_LOG_LEVEL: ${OCR_WORKER_LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
      - ocr_nfs_cache:/nfs-cache
      - ./app:/app/app
    tmpfs:
      - /tmp
      - /data/tmp
    networks:
      - grh_network
    command: ["python3", "-m", "app.worker_main"]
    restart: unless-stopped

volumes:
  opensearch_data:
  ocr_nfs_cache:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.0.0.102,nolock,soft,rw
      device: :/nfs/ocr

networks:
  grh_network:
    external: true
