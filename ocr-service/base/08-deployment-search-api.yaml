apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-search-api
  namespace: ocr-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ocr-search-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ocr-search-api
        app.kubernetes.io/part-of: ocr-service
    spec:
      containers:
        - name: search-api
          image: ryuk89/ocr-service:20260424-01
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.search_api:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: ocr-search-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
