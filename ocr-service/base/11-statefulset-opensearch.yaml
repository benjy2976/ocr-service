apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: ocr-service
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/part-of: ocr-service
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.15.0
          imagePullPolicy: IfNotPresent
          args:
            - -Ediscovery.type=single-node
          env:
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: -Xms1g -Xmx1g
          ports:
            - name: rest
              containerPort: 9200
            - name: metrics
              containerPort: 9600
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /
              port: rest
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: rest
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
          securityContext:
            allowPrivilegeEscalation: false
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: opensearch-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 30Gi
        storageClassName: longhorn
