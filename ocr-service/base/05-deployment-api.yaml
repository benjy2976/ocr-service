apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-api
  namespace: ocr-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ocr-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ocr-api
        app.kubernetes.io/part-of: ocr-service
    spec:
      containers:
        - name: api
          image: ryuk89/ocr-service:20260424-01
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: ocr-service-config
            - secretRef:
                name: ocr-service-secret
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: ocr-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: ocr-data
          persistentVolumeClaim:
            claimName: ocr-data
